ai_usage_summary: |
  GitHub Copilot was used primarily as a development assistant for code scaffolding, 
  boilerplate generation, syntax completion, and implementation support. The overall 
  system architecture, pipeline design, engineering decisions, evaluation strategy, 
  explainability framework, and iterative refinement were directed, reviewed, and 
  validated through human development. AI assistance accelerated routine implementation 
  while the project structure, feature integration, debugging, testing, and design 
  decisions remained under active human guidance. No candidate data was sent to external 
  APIs during the ranking inference stage; all inference is performed locally on CPU-only 
  infrastructure.


methodology_summary: |
  Evidence-weighted hybrid ranker with five interpretable scoring components:
  (1) semantic alignment between candidate profile tokens and job requirements,
  (2) experience-years alignment against stated seniority range,
  (3) career progression depth and seniority signals,
  (4) behavioural availability (open-to-work, response rate, interview
  completion), and (5) trust/completeness signals (verified contact, LinkedIn,
  profile completeness score). Components are combined with learned weights
  (0.30 / 0.20 / 0.15 / 0.20 / 0.15). Candidate shortlisting uses a
  three-strategy hybrid retrieval (lexical 35 % + semantic 45 % + metadata
  20 %) over the full candidate corpus before ranking. A plausibility filter
  downweights impossible profiles and explicitly guards against honeypot-type
  anomalies. Confidence is estimated from profile completeness, consistency,
  and inter-component agreement. Explanations are templated from the strongest
  evidence signals and attached per candidate. Runtime is under 5 minutes for
  100 000 candidates on CPU.

